<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Alerta Diabetes Comunitário</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Biblioteca EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="contato.js" defer></script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="/assets/coracao.png" alt="Ícone de saúde" />
      <h1>Alerta Diabetes Comunitário</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html" class="ativo">Contato</a>
    </nav>
  </header>

  <main class="conteudo">
    <section class="card-contato">
      <h2>Fale Conosco</h2>
      <p>Envie sua mensagem, dúvida ou sugestão. Entraremos em contato o mais breve possível!</p>

      <form id="formContato">
        <label>Nome</label>
        <input type="text" id="nome" name="from_name" placeholder="Digite seu nome" required />

        <label>Email</label>
        <input type="email" id="email" name="from_email" placeholder="seuemail@exemplo.com" required />

        <label>Mensagem</label>
        <textarea id="mensagem" name="message" rows="4" placeholder="Escreva sua mensagem..." required></textarea>

        <button type="submit">Enviar Mensagem</button>
      </form>

      <p id="resposta" class="mensagem-sucesso"></p>
    </section>
  </main>
</body>
</html>
